{% extends 'notes/base.html' %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
    >

    <input
        type="password"
        name="password"
    >

    <button type="submit">
        Login
    </button>

</form>

{% endblock %}
