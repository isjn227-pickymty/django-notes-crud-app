{% extends 'notes/base.html' %}

{% block content %}

    <h1>Edit Note</h1>

    <form method="POST">

        {% csrf_token %}

        <input 
            type="text"
            name="title"
            value="{{ note.title }}"
        >

        <textarea
            name="content"
            class="form-control"
        >
            {{ note.content}}
        </textarea>


        <button type="submit">
            Save
        </button>

    </form>

{% endblock %}
