{% extends 'notes/base.html' %}

{% block content %}

<form method="POST">

    {% csrf_token %}

    <input 
        type="text"
        name="username"
        class="form-control"
    />


    <input 
        type="password"
        name="password"
        class="form-control"
    />


    <input 
        type="password"
        name="confirm_password"
        class="form-control"
    />

    <button type="submit">
        Register
    </button>

</form>

{% endblock %}
